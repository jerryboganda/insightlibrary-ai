name: ci

# Lightweight, fast checks only. No multi-OS desktop bundle builds — those are
# slow and irrelevant to the server deploy. Keep this quick; verify the rest live.

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Frontend: typecheck the Svelte app only (svelte-kit sync + svelte-check).
  web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @insightlibrary/app check

  # Backend: format, lint, and unit tests for the Rust engine.
  rust:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    env:
      CARGO_TERM_COLOR: always
      SQLX_OFFLINE: "true"
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: backend
      - run: cargo fmt --all --check
      - run: cargo clippy --workspace --all-targets -- -D warnings
      - run: cargo test --workspace

  # Cheap guard: catch a broken production compose before it wastes a VPS build.
  compose:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - name: Validate production compose
        run: |
          cp .env.example .env
          docker compose --env-file .env -f deploy/docker-compose.yml -p insight config -q
