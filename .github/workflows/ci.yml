name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  # Type-check and build the JS/TS workspaces (UI + API + packages).
  web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @insightlibrary/app check
      - run: pnpm --filter @insightlibrary/server test
      - run: pnpm --filter @insightlibrary/app build:desktop
      - run: pnpm --filter @insightlibrary/app build:web
      - run: pnpm --filter @insightlibrary/server build

  # Build the desktop bundle on all three OSes.
  desktop:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
          - platform: ubuntu-latest
          - platform: windows-latest
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - uses: dtolnay/rust-toolchain@stable
      - uses: swatinem/rust-cache@v2
        with:
          workspaces: apps/desktop/src-tauri
      # Linux WebKitGTK + build deps for Tauri 2.
      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @insightlibrary/desktop exec tauri build
        env:
          # Tauri needs the frontend built first; beforeBuildCommand handles it.
          NODE_OPTIONS: --max_old_space_size=4096
