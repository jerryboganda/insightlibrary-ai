name: deploy

# Build ALL images on GitHub Actions -> push to GHCR -> the VPS only pulls and
# restarts. Zero compilation on the shared production box (project rule).
#
#   build:  runners compile + push ghcr.io/jerryboganda/insight-{api,worker,
#           parser-svc,inference-svc,app}, tagged :latest and :<sha>.
#   deploy: rsync deploy/ config, then on the VPS: docker login ghcr -> pull the
#           5 images by :<sha> -> compose up -d --no-build (errors if an image is
#           missing, so the box can never fall back to building).

on:
  push:
    branches: [main]
    paths:
      - "backend/**"
      - "apps/app/**"
      - "packages/**"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"
      - "package.json"
      - ".github/workflows/deploy.yml"
  workflow_dispatch: {}

concurrency:
  group: deploy-vps
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  OWNER: jerryboganda
  VPS_HOST: 185.252.233.186
  VPS_USER: root

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Rust: one compile (shared cargo-chef builder stage, cached in GHA) emits
      # both the api and worker images.
      - name: Build & push insight-api
        uses: docker/build-push-action@v6
        with:
          context: backend
          file: backend/deploy/Dockerfile.rust
          target: api
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.OWNER }}/insight-api:latest
            ${{ env.REGISTRY }}/${{ env.OWNER }}/insight-api:${{ github.sha }}
          cache-from: type=gha,scope=rust
          cache-to: type=gha,mode=max,scope=rust

      - name: Build & push insight-worker
        uses: docker/build-push-action@v6
        with:
          context: backend
          file: backend/deploy/Dockerfile.rust
          target: worker
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.OWNER }}/insight-worker:latest
            ${{ env.REGISTRY }}/${{ env.OWNER }}/insight-worker:${{ github.sha }}
          cache-from: type=gha,scope=rust
          cache-to: type=gha,mode=max,scope=rust

      - name: Build & push parser-svc
        uses: docker/build-push-action@v6
        with:
          context: backend/services/parser-svc
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.OWNER }}/insight-parser-svc:latest
            ${{ env.REGISTRY }}/${{ env.OWNER }}/insight-parser-svc:${{ github.sha }}
          cache-from: type=gha,scope=parser
          cache-to: type=gha,mode=max,scope=parser

      - name: Build & push inference-svc
        uses: docker/build-push-action@v6
        with:
          context: backend/services/inference-svc
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.OWNER }}/insight-inference-svc:latest
            ${{ env.REGISTRY }}/${{ env.OWNER }}/insight-inference-svc:${{ github.sha }}
          cache-from: type=gha,scope=inference
          cache-to: type=gha,mode=max,scope=inference

      # Static Svelte front-end (apps/app, web target). Context is the monorepo
      # root (workspace deps); VITE_API_URL is inlined at build time.
      - name: Build & push insight-app
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/app/Dockerfile
          push: true
          build-args: |
            VITE_API_URL=https://insight-api.polytronx.com
          tags: |
            ${{ env.REGISTRY }}/${{ env.OWNER }}/insight-app:latest
            ${{ env.REGISTRY }}/${{ env.OWNER }}/insight-app:${{ github.sha }}
          cache-from: type=gha,scope=app
          cache-to: type=gha,mode=max,scope=app

  deploy:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
    steps:
      - uses: actions/checkout@v4

      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh && chmod 700 ~/.ssh
          printf '%s\n' "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H "$VPS_HOST" >> ~/.ssh/known_hosts 2>/dev/null

      # Ship only deploy/ config (compose, Caddyfile, scripts, postgres-init).
      # No source, no --delete; live cloudflared tunnel creds are excluded.
      - name: Sync deploy config to VPS
        run: |
          rsync -az \
            --exclude='cloudflared/config.yml' \
            --exclude='cloudflared/*.json' \
            -e "ssh -i ~/.ssh/id_ed25519 -o IdentitiesOnly=yes -o StrictHostKeyChecking=accept-new" \
            backend/deploy/ "$VPS_USER@$VPS_HOST:/opt/insight/app/deploy/"

      - name: Pull prebuilt images & restart (no build on VPS)
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | ssh -i ~/.ssh/id_ed25519 -o IdentitiesOnly=yes -o StrictHostKeyChecking=accept-new \
            "$VPS_USER@$VPS_HOST" 'docker login ghcr.io -u ${{ github.actor }} --password-stdin'
          ssh -i ~/.ssh/id_ed25519 -o IdentitiesOnly=yes -o StrictHostKeyChecking=accept-new \
            "$VPS_USER@$VPS_HOST" \
            "IMAGE_TAG=${{ github.sha }} bash /opt/insight/app/deploy/scripts/pull-and-up.sh"

      - name: Post-deploy status
        run: |
          ssh -i ~/.ssh/id_ed25519 -o IdentitiesOnly=yes -o StrictHostKeyChecking=accept-new \
            "$VPS_USER@$VPS_HOST" 'bash /opt/insight/app/deploy/scripts/compose.sh ps'
