name: deploy

# Ship the Rust backend to the shared production VPS. Triggered on push to main
# (backend changes only) — GitHub Actions owns the deploy per the project rule.
#
# Mechanism: rsync backend/ -> /opt/insight/app/ (NO --delete; live-only files
# like .env and the cloudflared tunnel creds are excluded and never touched),
# then rebuild/restart the `insight` compose project on the box.

on:
  push:
    branches: [main]
    paths:
      - "backend/**"
      - ".github/workflows/deploy.yml"
  workflow_dispatch: {}

concurrency:
  group: deploy-vps
  cancel-in-progress: false

env:
  VPS_HOST: 185.252.233.186
  VPS_USER: root

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh && chmod 700 ~/.ssh
          printf '%s\n' "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H "$VPS_HOST" >> ~/.ssh/known_hosts 2>/dev/null

      - name: Sync backend to VPS
        run: |
          rsync -az --human-readable \
            --exclude='.git' \
            --exclude='.env' \
            --exclude='.env.*' \
            --exclude='target' \
            --exclude='node_modules' \
            --exclude='deploy/cloudflared/config.yml' \
            --exclude='deploy/cloudflared/*.json' \
            --exclude='services/**/models' \
            -e "ssh -i ~/.ssh/id_ed25519 -o IdentitiesOnly=yes -o StrictHostKeyChecking=accept-new" \
            backend/ "$VPS_USER@$VPS_HOST:/opt/insight/app/"

      - name: Build & restart insight stack
        run: |
          ssh -i ~/.ssh/id_ed25519 -o IdentitiesOnly=yes -o StrictHostKeyChecking=accept-new \
            "$VPS_USER@$VPS_HOST" \
            'bash /opt/insight/app/deploy/scripts/compose.sh up -d --build --remove-orphans'

      - name: Post-deploy status
        run: |
          ssh -i ~/.ssh/id_ed25519 -o IdentitiesOnly=yes -o StrictHostKeyChecking=accept-new \
            "$VPS_USER@$VPS_HOST" \
            'bash /opt/insight/app/deploy/scripts/compose.sh ps'
