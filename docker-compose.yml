# Local infrastructure for the InsightLibrary AI backend.
# The app runs WITHOUT this (in-memory repository); bring it up to exercise the
# real Postgres + pgvector data path and S3-compatible object storage.
#
#   docker compose up -d
#   cd apps/server && cp .env.example .env   # set DATABASE_URL + S3_* to match below
#   pnpm --filter @insightlibrary/server db:push
#   pnpm --filter @insightlibrary/server db:seed
services:
  postgres:
    image: pgvector/pgvector:pg17
    environment:
      POSTGRES_USER: insightlibrary
      POSTGRES_PASSWORD: insightlibrary
      POSTGRES_DB: insightlibrary
    ports:
      - '5432:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data
      # Creates the vector + pg_trgm extensions on first start (before db:push).
      - ./apps/server/db-init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U insightlibrary']
      interval: 5s
      timeout: 5s
      retries: 10

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: insightlibrary
      MINIO_ROOT_PASSWORD: insightlibrary
    ports:
      - '9000:9000'
      - '9001:9001'
    volumes:
      - miniodata:/data

volumes:
  pgdata:
  miniodata:
